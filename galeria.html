<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria | SpatulaPuff</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: rgba(0,0,0,0.3);
  color: white;
}

.top-bar img {
  width: 40px;
  border-radius: 10px;
  background: white;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-text {
  line-height: 1;
}

.brand-text .name {
  font-family: 'Playfair Display';
  font-size: 18px;
}

.brand-text .sub {
  font-family: 'Dancing Script';
  font-size: 18px;
}

.back {
  color: white;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  padding: 8px 12px;
  border-radius: 10px;
}

.hero {
  text-align: center;
  color: white;
  padding: 40px 20px;
}

.hero h1 {
  font-family: 'Playfair Display';
  font-size: 50px;
}

.gallery {
  max-width: 1100px;
  margin: auto;
  background: white;
  border-radius: 20px;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.item {
  overflow: hidden;
  border-radius: 15px;
  cursor: pointer;
}

.item img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: 0.3s;
}

.item img:hover {
  transform: scale(1.05);
}

.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 15px;
}

.lightbox.show {
  display: flex;
}

@media(max-width: 800px){
  .grid {
    grid-template-columns: repeat(2,1fr);
  }
}

@media(max-width: 500px){
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="brand">
    <img src="logo.png">
    <div class="brand-text">
      <div class="name">Justyna Słota</div>
      <div class="sub">SpatulaPuff</div>
    </div>
  </div>

  <a href="index.html" class="back">← Powrót</a>
</div>

<div class="hero">
  <h1>Galeria</h1>
</div>

<div class="gallery">
  <div class="grid">

    <div class="item">
      <img src="https://picsum.photos/500/300?1" onclick="openImg(this.src)">
    </div>

    <div class="item">
      <img src="https://picsum.photos/500/300?2" onclick="openImg(this.src)">
    </div>

    <div class="item">
      <img src="https://picsum.photos/500/300?3" onclick="openImg(this.src)">
    </div>

    <div class="item">
      <img src="https://picsum.photos/500/300?4" onclick="openImg(this.src)">
    </div>

    <div class="item">
      <img src="https://picsum.photos/500/300?5" onclick="openImg(this.src)">
    </div>

    <div class="item">
      <img src="https://picsum.photos/500/300?6" onclick="openImg(this.src)">
    </div>

  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
</div>

<script>
function openImg(src){
  document.getElementById("lightbox").classList.add("show");
  document.getElementById("lightbox-img").src = src;
}

function closeImg(){
  document.getElementById("lightbox").classList.remove("show");
}
</script>

</body>
</html>
