<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria | SpatulaPuff</title>
<link rel="icon" href="favicon.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  color: white;
}

.back {
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.2);
  padding: 10px 15px;
  border-radius: 10px;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 15px;
  cursor: pointer;
}

.lightbox {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div class="top">
  <h2>Galeria</h2>
  <a href="index.html" class="back">Powrót</a>
</div>

<div class="container">
  <div class="grid">

    <img src="foto1.jpg" onclick="openImg(this.src)">
    <img src="foto2.jpg" onclick="openImg(this.src)">
    <img src="foto3.jpg" onclick="openImg(this.src)">
    <img src="foto4.jpg" onclick="openImg(this.src)">
    <img src="foto5.jpg" onclick="openImg(this.src)">

  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="big">
</div>

<script>
function openImg(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("big").src = src;
}

function closeImg() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
