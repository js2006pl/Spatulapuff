<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria | SpatulaPuff</title>
<link rel="icon" href="favicon.png">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  color: white;
}

.back {
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.2);
  padding: 10px 15px;
  border-radius: 10px;
}

.container {
  max-width: 1100px;
  margin: 20px auto;
  background: white;
  padding: 18px;
  border-radius: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.item {
  overflow: hidden;
  border-radius: 16px;
  background: #f2f2f2;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.item img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
  cursor: pointer;
  transition: transform 0.35s ease, box-shadow 0.35s ease, filter 0.35s ease;
}

.item:hover img {
  transform: scale(1.06) rotate(-0.5deg);
  filter: brightness(1.05);
  box-shadow: 0 16px 30px rgba(0,0,0,0.18);
}

.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 20px;
}

.lightbox.show {
  display: flex;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 18px;
  animation: zoomIn 0.3s ease;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}

@keyframes zoomIn {
  from {
    transform: scale(0.75);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .item img {
    height: 170px;
  }
}

@media (max-width: 560px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .item img {
    height: 200px;
  }
}
</style>
</head>

<body>

<div class="top">
  <h2>Galeria</h2>
  <a href="index.html" class="back">Powrót</a>
</div>

<div class="container">
  <div class="grid">
    <div class="item"><img src="foto1.jpg" alt="Zdjęcie 1" onclick="openImg(this.src)"></div>
    <div class="item"><img src="foto2.jpg" alt="Zdjęcie 2" onclick="openImg(this.src)"></div>
    <div class="item"><img src="foto3.jpg" alt="Zdjęcie 3" onclick="openImg(this.src)"></div>
    <div class="item"><img src="foto4.jpg" alt="Zdjęcie 4" onclick="openImg(this.src)"></div>
    <div class="item"><img src="foto5.jpg" alt="Zdjęcie 5" onclick="openImg(this.src)"></div>
    <div class="item"><img src="foto6.jpg" alt="Zdjęcie 6" onclick="openImg(this.src)"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="big" alt="Powiększone zdjęcie">
</div>

<script>
function openImg(src) {
  document.getElementById("big").src = src;
  document.getElementById("lightbox").classList.add("show");
}

function closeImg() {
  document.getElementById("lightbox").classList.remove("show");
}
</script>

</body>
</html>
