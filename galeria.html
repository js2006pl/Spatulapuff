<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria | SpatulaPuff</title>
<link rel="icon" href="favicon.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  color: white;
}

.back {
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.2);
  padding: 10px 15px;
  border-radius: 10px;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  padding: 20px;
  border-radius: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.grid img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 15px;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.grid img:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 24px rgba(0,0,0,0.2);
}

.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 20px;
}

.lightbox.show {
  display: flex;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 18px;
  animation: zoom 0.3s ease;
}

@keyframes zoom {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@media (max-width: 800px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 500px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="top">
  <h2>Galeria</h2>
  <a href="index.html" class="back">Powrót</a>
</div>

<div class="container">
  <div class="grid">
    <img src="foto1.jpg" onclick="openImg(this.src)">
    <img src="foto2.jpg" onclick="openImg(this.src)">
    <img src="foto3.jpg" onclick="openImg(this.src)">
    <img src="foto4.jpg" onclick="openImg(this.src)">
    <img src="foto5.jpg" onclick="openImg(this.src)">
    <img src="foto6.jpg" onclick="openImg(this.src)">
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="big">
</div>

<script>
function openImg(src) {
  document.getElementById("big").src = src;
  document.getElementById("lightbox").classList.add("show");
}

function closeImg() {
  document.getElementById("lightbox").classList.remove("show");
}
</script>

</body>
</html>
