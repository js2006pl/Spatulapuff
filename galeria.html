<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria | SpatulaPuff</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.10), transparent 28%),
    radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 24%),
    linear-gradient(135deg, #667eea, #764ba2);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 22px;
  color: white;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 20px rgba(0,0,0,0.10);
}

.top h2 {
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  letter-spacing: 0.3px;
}

.back {
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.18);
  padding: 10px 16px;
  border-radius: 12px;
  font-weight: 600;
  transition: 0.25s ease;
}

.back:hover {
  background: rgba(255,255,255,0.28);
  transform: translateY(-1px);
}

.container {
  max-width: 1120px;
  margin: 26px auto;
  background: rgba(255,255,255,0.94);
  padding: 20px;
  border-radius: 28px;
  box-shadow: 0 24px 60px rgba(32,18,80,0.20);
  backdrop-filter: blur(10px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.item {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  background: #f2f2f2;
  box-shadow: 0 10px 24px rgba(0,0,0,0.08);
}

.item img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
  cursor: pointer;
  transition: transform 0.45s ease, filter 0.35s ease;
}

.item::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.50), rgba(0,0,0,0.05), transparent 55%);
  opacity: 0;
  transition: opacity 0.35s ease;
  pointer-events: none;
}

.caption {
  position: absolute;
  left: 14px;
  bottom: 12px;
  color: white;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2px;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.35s ease;
  z-index: 2;
  pointer-events: none;
  text-shadow: 0 3px 10px rgba(0,0,0,0.35);
}

.item:hover img {
  transform: scale(1.08);
  filter: brightness(1.08) saturate(1.05);
}

.item:hover::after {
  opacity: 1;
}

.item:hover .caption {
  opacity: 1;
  transform: translateY(0);
}

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(8,8,16,0.92);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 24px;
}

.lightbox.show {
  display: flex;
}

.lightbox-inner {
  position: relative;
  max-width: 92vw;
  max-height: 92vh;
  animation: zoomIn 0.28s ease;
}

.lightbox img {
  max-width: 92vw;
  max-height: 88vh;
  border-radius: 20px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.38);
  display: block;
}

.close-btn {
  position: absolute;
  top: -14px;
  right: -14px;
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 50%;
  background: white;
  color: #333;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
}

.close-btn:hover {
  transform: scale(1.05);
}

@keyframes zoomIn {
  from {
    transform: scale(0.86);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .item img {
    height: 170px;
  }
}

@media (max-width: 560px) {
  .top {
    padding: 14px 16px;
  }

  .top h2 {
    font-size: 24px;
  }

  .container {
    margin: 18px 12px;
    padding: 14px;
    border-radius: 22px;
  }

  .grid {
    grid-template-columns: 1fr;
  }

  .item img {
    height: 200px;
  }
}
</style>
</head>

<body>

<div class="top">
  <h2>Galeria</h2>
  <a href="index.html" class="back">Powrót</a>
</div>

<div class="container">
  <div class="grid">
    <div class="item" onclick="openImg('foto1.jpg')">
      <img src="foto1.jpg" alt="Zdjęcie 1">
      <div class="caption">Zdjęcie 1</div>
    </div>

    <div class="item" onclick="openImg('foto2.jpg')">
      <img src="foto2.jpg" alt="Zdjęcie 2">
      <div class="caption">Zdjęcie 2</div>
    </div>

    <div class="item" onclick="openImg('foto3.jpg')">
      <img src="foto3.jpg" alt="Zdjęcie 3">
      <div class="caption">Zdjęcie 3</div>
    </div>

    <div class="item" onclick="openImg('foto4.jpg')">
      <img src="foto4.jpg" alt="Zdjęcie 4">
      <div class="caption">Zdjęcie 4</div>
    </div>

    <div class="item" onclick="openImg('foto5.jpg')">
      <img src="foto5.jpg" alt="Zdjęcie 5">
      <div class="caption">Zdjęcie 5</div>
    </div>

    <div class="item" onclick="openImg('foto6.jpg')">
      <img src="foto6.jpg" alt="Zdjęcie 6">
      <div class="caption">Zdjęcie 6</div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeImg(event)">
  <div class="lightbox-inner">
    <button class="close-btn" onclick="forceClose()">×</button>
    <img id="big" alt="Powiększone zdjęcie">
  </div>
</div>

<script>
function openImg(src) {
  document.getElementById("big").src = src;
  document.getElementById("lightbox").classList.add("show");
}

function closeImg(event) {
  if (event.target.id === "lightbox") {
    document.getElementById("lightbox").classList.remove("show");
  }
}

function forceClose() {
  document.getElementById("lightbox").classList.remove("show");
}

document.addEventListener("keydown", function(event) {
  if (event.key === "Escape") {
    document.getElementById("lightbox").classList.remove("show");
  }
});
</script>

</body>
</html>
